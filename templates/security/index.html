<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>安全审计 - 猎影哨兵</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='dist/tailwind.css') }}" />
  <script src="{{ url_for('static', filename='modules/security/security.js') }}" defer></script>
</head>
<body class="min-h-screen bg-[#faf9f5] text-slate-900">
  <header class="border-b border-[#e8e6dc] bg-[#f5f4ed] px-8 py-5">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-6">
      <div>
        <div class="text-xs font-bold uppercase tracking-[0.24em] text-[#c96442]">Security Audit</div>
        <h1 class="mt-2 text-3xl font-bold tracking-tight">安全审计</h1>
        <p class="mt-2 text-sm text-slate-500">关键操作留痕、敏感字段访问记录和权限摘要。</p>
      </div>
      <a href="{{ url_for('job.index') }}" class="rounded-lg border border-[#e8e6dc] bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">返回工作台</a>
    </div>
  </header>

  <main class="mx-auto max-w-7xl space-y-6 px-8 py-8">
    <section class="grid gap-6 lg:grid-cols-[360px_1fr]">
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <h2 class="text-lg font-bold">当前用户</h2>
        <div id="securityCurrentUser" class="mt-4 rounded-xl bg-slate-50 px-4 py-3 text-sm">加载中...</div>
      </div>
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <h2 class="text-lg font-bold">权限摘要</h2>
        <div id="securityPermissions" class="mt-4 flex flex-wrap gap-2"></div>
      </div>
    </section>

    <section class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
      <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
        <div>
          <h2 class="text-lg font-bold">操作审计日志</h2>
          <p class="mt-1 text-sm text-slate-500">默认展示最近 100 条关键操作。</p>
        </div>
        <div class="flex flex-wrap items-end gap-3">
          <label class="block text-xs font-semibold text-slate-600">
            模块
            <input id="audit_module_code" class="mt-1 rounded-lg border border-slate-200 px-3 py-2 text-sm" placeholder="dispatch" />
          </label>
          <label class="block text-xs font-semibold text-slate-600">
            动作
            <input id="audit_action_code" class="mt-1 rounded-lg border border-slate-200 px-3 py-2 text-sm" placeholder="send" />
          </label>
          <label class="block text-xs font-semibold text-slate-600">
            用户
            <input id="audit_username" class="mt-1 rounded-lg border border-slate-200 px-3 py-2 text-sm" placeholder="用户名" />
          </label>
          <button type="button" onclick="refreshAuditLogs(this)" class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700">查询</button>
        </div>
      </div>
      <div class="mt-5 overflow-x-auto">
        <table class="w-full text-left text-sm">
          <thead class="border-b border-slate-200 text-xs text-slate-500">
            <tr>
              <th class="px-4 py-3">时间</th>
              <th class="px-4 py-3">用户</th>
              <th class="px-4 py-3">模块</th>
              <th class="px-4 py-3">动作</th>
              <th class="px-4 py-3">结果</th>
              <th class="px-4 py-3">请求</th>
              <th class="px-4 py-3">错误</th>
            </tr>
          </thead>
          <tbody id="securityAuditRows"></tbody>
        </table>
      </div>
    </section>

    <section class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
      <div class="flex items-center justify-between gap-4">
        <div>
          <h2 class="text-lg font-bold">敏感字段访问</h2>
          <p class="mt-1 text-sm text-slate-500">查看完整身份证、手机号、地址等字段时记录访问原因。</p>
        </div>
        <button type="button" onclick="refreshSensitiveAccess()" class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">刷新</button>
      </div>
      <div id="securitySensitiveRows" class="mt-5 grid gap-3 md:grid-cols-2"></div>
    </section>
  </main>
</body>
</html>
