{% extends "base_sentinel.html" %}

{% block title %}关系图谱 - 未成年人智能管控中枢{% endblock %}

{% block head %}
  <style>
    .search-input { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 8px 14px; color: #e2e8f0; width: 280px; font-size: 0.9rem; }
    .search-input:focus { outline: none; border-color: #3b82f6; }
    .sidebar { background: #1e293b; border-left: 1px solid #334155; width: 320px; overflow-y: auto; }
    .sidebar-hidden { display: none; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #94a3b8; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .control-btn { background: #334155; border: none; color: #94a3b8; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }
    .control-btn:hover { background: #475569; color: white; }
    .control-btn.active { background: #3b82f6; color: white; }
    .filter-select { background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 0.75rem; min-width: 120px; padding: 5px 8px; }
    .filter-select:focus { outline: none; border-color: #3b82f6; }
  </style>
{% endblock %}

{% block content %}
  <div class="flex" style="height: 100%; flex-direction: column;">
    <!-- Custom Header for Graph Page -->
    <div class="flex items-center justify-between px-6 py-3 border-b border-slate-700 shrink-0">
      <div class="flex items-center gap-4">
        <h2 class="text-base font-bold text-white">关系图谱</h2>
        <form id="searchForm" class="flex items-center gap-2" onsubmit="return handleSearch(event)">
          <input type="text" id="searchInput" class="search-input" placeholder="输入姓名/身份证号/案件编号..." />
          <button type="submit" class="control-btn">搜索</button>
        </form>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex gap-1">
          <button class="control-btn active" onclick="setDepth(1)">1层</button>
          <button class="control-btn" onclick="setDepth(2)">2层</button>
          <button class="control-btn" onclick="setDepth(3)">3层</button>
        </div>
        <label class="flex items-center gap-2 text-xs text-slate-400">
          关系筛选
          <select id="relationFilter" class="filter-select" multiple size="3" onchange="reloadCurrentGraph()">
            <option value="suspected_in" selected>涉案</option>
            <option value="co_suspect" selected>共犯</option>
            <option value="guardian_of" selected>监护</option>
            <option value="studies_at" selected>就读</option>
            <option value="appeared_at" selected>轨迹</option>
            <option value="checked_in" selected>入住</option>
            <option value="lives_at" selected>居住</option>
            <option value="same_school" selected>同校</option>
            <option value="same_area" selected>同辖区</option>
          </select>
        </label>
        <label class="flex items-center gap-2 text-xs text-slate-400">
          时间范围
          <select id="timeRange" class="filter-select" onchange="reloadCurrentGraph()">
            <option value="">全部</option>
            <option value="1m">近 1 月</option>
            <option value="3m">近 3 月</option>
            <option value="6m">近 6 月</option>
            <option value="1y">近 1 年</option>
          </select>
        </label>
      </div>
    </div>

    <div class="flex" style="height: calc(100% - 52px);">
      <!-- Graph Canvas -->
      <div class="flex-1 relative">
        <div id="graphCanvas" class="w-full h-full"></div>
        <!-- Legend -->
        <div class="absolute bottom-4 left-4 bg-slate-800/90 rounded-lg p-3 flex flex-col gap-2">
          <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> 人员</div>
          <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div> 案件</div>
          <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> 学校</div>
          <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div> 监护人</div>
          <div class="legend-item"><div class="legend-dot" style="background:#14b8a6"></div> 地点</div>
          <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div> 机构</div>
          <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div> 高风险</div>
        </div>
        <!-- Placeholder -->
        <div id="placeholder" class="absolute inset-0 flex items-center justify-center text-slate-500">
          <div class="text-center">
            <div class="text-4xl mb-4">🔍</div>
            <div>搜索姓名或身份证号，展开关系图谱</div>
          </div>
        </div>
      </div>

      <!-- Detail Sidebar -->
      <aside id="sidebar" class="sidebar sidebar-hidden p-4">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-sm font-bold">节点详情</h3>
          <button onclick="closeSidebar()" class="text-slate-400 hover:text-white text-lg">&times;</button>
        </div>
        <div id="sidebarContent"></div>
      </aside>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='vendor/echarts.min.js') }}"></script>
  <script src="{{ url_for('static', filename='modules/graph/graph.js') }}"></script>
{% endblock %}
