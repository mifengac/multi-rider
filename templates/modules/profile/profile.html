<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />

  <title>个人画像 - 未成年人智能管控中枢</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='dist/tailwind.css') }}" />
  <script src="{{ url_for('static', filename='vendor/echarts.min.js') }}"></script>
  <style>
    body { background: #f8fafc; color: #1e293b; font-family: system-ui, -apple-system, sans-serif; }
    .profile-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; }
    .section-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #f1f5f9; }
    .risk-bar { height: 8px; border-radius: 4px; background: #e2e8f0; overflow: hidden; }
    .risk-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; color: white; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; background: #f1f5f9; color: #475569; margin: 2px; }
    .nav-link { color: #64748b; text-decoration: none; padding: 6px 16px; border-radius: 6px; font-size: 0.85rem; }
    .nav-link:hover { background: #f1f5f9; color: #1e293b; }
    .timeline-item { position: relative; padding-left: 24px; padding-bottom: 16px; border-left: 2px solid #e2e8f0; }
    .timeline-item::before { content: ''; position: absolute; left: -5px; top: 4px; width: 8px; height: 8px; border-radius: 50%; background: #3b82f6; }
  </style>
</head>
<body class="min-h-screen">

      <h1 class="text-lg font-bold text-slate-800">个人画像</h1>
    </div>
    <nav class="flex items-center gap-2">
      <a href="/dashboard" class="nav-link">态势总览</a>
      <a href="/graph" class="nav-link">关系图谱</a>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto p-6" id="profileMain">
    <div class="text-center py-20 text-slate-400" id="loadingState">加载中...</div>
  </main>
