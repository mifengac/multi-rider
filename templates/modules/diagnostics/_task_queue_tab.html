<div id="tabDiagnostics" class="hidden">
  <div class="space-y-6">
    <section class="rounded-[32px] border border-white/70 bg-white/85 p-5 shadow-[0_24px_60px_rgba(15,23,42,0.08)] backdrop-blur md:p-8">
      <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
        <div>
          <div class="text-xs font-semibold uppercase tracking-[0.35em] text-teal-600">Queue Diagnostics</div>
          <h2 class="mt-2 text-2xl font-bold text-slate-900">任务队列诊断</h2>
          <p class="mt-3 max-w-3xl text-sm leading-7 text-slate-500">
            只读查看 Worker 队列、健康检查和最近任务状态。这里不会重置、重试或删除任务，只用于判断 Web、SQLite 和 Worker 是否协同正常。
          </p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <label class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2 text-xs font-semibold text-slate-600">
            <input id="diagAutoRefresh" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-teal-600" checked />
            自动刷新
          </label>
          <button id="diagRefreshBtn" type="button" onclick="refreshTaskQueueDiagnostics()" class="rounded-full bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-700">
            刷新诊断
          </button>
        </div>
      </div>

      <div class="mt-6 grid gap-4 sm:grid-cols-2 xl:grid-cols-5">
        <div class="rounded-3xl border border-slate-200 bg-slate-50/80 p-4">
          <div class="text-xs text-slate-500">队列总数</div>
          <div id="diagQueueTotal" class="mt-2 text-2xl font-bold text-slate-900">--</div>
        </div>
        <div class="rounded-3xl border border-slate-200 bg-slate-50/80 p-4">
          <div class="text-xs text-slate-500">等待中</div>
          <div id="diagQueuePending" class="mt-2 text-2xl font-bold text-slate-900">--</div>
        </div>
        <div class="rounded-3xl border border-slate-200 bg-slate-50/80 p-4">
          <div class="text-xs text-slate-500">运行中</div>
          <div id="diagQueueRunning" class="mt-2 text-2xl font-bold text-slate-900">--</div>
        </div>
        <div class="rounded-3xl border border-slate-200 bg-slate-50/80 p-4">
          <div class="text-xs text-slate-500">失败</div>
          <div id="diagQueueFailed" class="mt-2 text-2xl font-bold text-slate-900">--</div>
        </div>
        <div class="rounded-3xl border border-slate-200 bg-slate-50/80 p-4">
          <div class="text-xs text-slate-500">陈旧运行</div>
          <div id="diagQueueStale" class="mt-2 text-2xl font-bold text-slate-900">--</div>
        </div>
      </div>
    </section>

    <div class="grid gap-6 xl:grid-cols-[0.78fr,1.22fr]">
      <section class="space-y-6">
        <section class="rounded-[32px] border border-white/70 bg-white/85 p-5 shadow-[0_24px_60px_rgba(15,23,42,0.08)] backdrop-blur md:p-6">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="text-xs font-semibold uppercase tracking-[0.35em] text-slate-400">Health</div>
              <h3 class="mt-2 text-xl font-bold text-slate-900">健康摘要</h3>
            </div>
            <span id="diagHealthBadge" class="inline-flex items-center rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700 ring-1 ring-inset ring-slate-200">--</span>
          </div>
          <div id="diagHealthDetails" class="mt-4 rounded-2xl border border-slate-200 bg-slate-50/80 p-4 text-sm leading-7 text-slate-500">
            等待刷新...
          </div>
        </section>

        <section class="rounded-[32px] border border-white/70 bg-white/85 p-5 shadow-[0_24px_60px_rgba(15,23,42,0.08)] backdrop-blur md:p-6">
          <div class="text-xs font-semibold uppercase tracking-[0.35em] text-slate-400">Distribution</div>
          <h3 class="mt-2 text-xl font-bold text-slate-900">分布统计</h3>
          <div class="mt-5 grid gap-4 md:grid-cols-2 xl:grid-cols-1">
            <div>
              <div class="text-xs font-semibold text-slate-500">按状态</div>
              <div id="diagByStatus" class="mt-3 space-y-2"></div>
            </div>
            <div>
              <div class="text-xs font-semibold text-slate-500">按类型 / 状态</div>
              <div id="diagByTypeStatus" class="mt-3 space-y-2"></div>
            </div>
          </div>
        </section>
      </section>

      <section class="rounded-[32px] border border-white/70 bg-white/85 p-5 shadow-[0_24px_60px_rgba(15,23,42,0.08)] backdrop-blur md:p-6">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
          <div>
            <div class="text-xs font-semibold uppercase tracking-[0.35em] text-slate-400">Recent Tasks</div>
            <h3 class="mt-2 text-xl font-bold text-slate-900">最近队列任务</h3>
            <p id="diagLastRefresh" class="mt-2 text-xs text-slate-400">尚未刷新</p>
          </div>
          <div class="grid gap-3 sm:grid-cols-3">
            <label class="block">
              <span class="mb-1 block text-xs font-semibold text-slate-500">任务类型</span>
              <select id="diagTaskTypeFilter" class="rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm">
                <option value="">全部</option>
                <option value="detection">detection</option>
                <option value="upload">upload</option>
                <option value="train">train</option>
                <option value="auto_annotate">auto_annotate</option>
                <option value="face_library">face_library</option>
              </select>
            </label>
            <label class="block">
              <span class="mb-1 block text-xs font-semibold text-slate-500">状态</span>
              <select id="diagStatusFilter" class="rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm">
                <option value="">全部</option>
                <option value="pending">pending</option>
                <option value="running">running</option>
                <option value="completed">completed</option>
                <option value="failed">failed</option>
              </select>
            </label>
            <label class="block">
              <span class="mb-1 block text-xs font-semibold text-slate-500">数量</span>
              <select id="diagLimitFilter" class="rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm">
                <option value="30">30</option>
                <option value="60" selected>60</option>
                <option value="120">120</option>
                <option value="200">200</option>
              </select>
            </label>
          </div>
        </div>

        <div class="mt-6 overflow-hidden rounded-2xl border border-slate-200">
          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-200 text-sm">
              <thead class="bg-slate-50 text-xs uppercase tracking-wider text-slate-500">
                <tr>
                  <th class="px-4 py-3 text-left font-semibold">任务</th>
                  <th class="px-4 py-3 text-left font-semibold">状态</th>
                  <th class="px-4 py-3 text-left font-semibold">Job</th>
                  <th class="px-4 py-3 text-left font-semibold">耗时</th>
                  <th class="px-4 py-3 text-left font-semibold">Owner</th>
                  <th class="px-4 py-3 text-left font-semibold">错误</th>
                </tr>
              </thead>
              <tbody id="diagTaskRows" class="divide-y divide-slate-100 bg-white"></tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>
