<div id="tabOracle" class="wb-subpage hidden">
<div class="wb-layout wb-layout-oracle">
  <!-- Left Column (Main Focus) -->
  <div class="wb-col wb-col-7 xl:col-span-8 space-y-xl">
    <!-- Task Creation Form -->
    <section class="wb-card bg-surface ring-1 ring-[#e8e6dc] rounded-[24px] p-lg shadow-sm">
      <div class="flex justify-between items-start mb-md">
        <h3 class="wb-section-title font-headline-md text-headline-md text-on-surface">
          <svg class="icon-inline" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          配置检测参数
        </h3>
        <a href="/history-page" target="_blank" class="bg-surface-variant px-3 py-1 rounded-lg text-sm border border-outline-variant hover:bg-outline-variant text-on-surface transition-colors inline-block">运行记录</a>
      </div>
      <form id="jobForm" onsubmit="return startJob(event)" class="wb-form-grid space-y-md">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
          <div class="space-y-base">
            <label class="font-label-sm text-label-sm text-on-surface block">开始时间 (kssj)</label>
            <input type="datetime-local" id="kssj" name="kssj" value="{{ kssj_local }}" step="1" class="w-full bg-surface-container-low border-none border-b border-outline-variant focus:border-primary focus:ring-0 font-body-md rounded-none px-0 py-sm" />
          </div>
          <div class="space-y-base">
            <label class="font-label-sm text-label-sm text-on-surface block">结束时间 (jssj)</label>
            <input type="datetime-local" id="jssj" name="jssj" value="{{ jssj_local }}" step="1" class="w-full bg-surface-container-low border-none border-b border-outline-variant focus:border-primary focus:ring-0 font-body-md rounded-none px-0 py-sm" />
          </div>
        </div>
        
        <div class="space-y-base">
          <label class="font-label-sm text-label-sm text-on-surface block">研判模型</label>
          <select id="model_key" name="model_key" class="w-full bg-surface-container-low border-none border-b border-outline-variant focus:border-primary focus:ring-0 font-body-md rounded-none px-0 py-sm">
            <option value="general" {% if model_default == 'general' %}selected{% endif %}>通用人车要素识别</option>
            <option value="bczj" {% if model_default == 'bczj' %}selected{% endif %}>专项违法行为识别</option>
          </select>
        </div>

        <div class="space-y-base">
          <label for="classes" id="classesLabel" class="font-label-sm text-label-sm text-on-surface block">检测提示词</label>
          <input type="text" id="classes" name="classes" value="" class="w-full bg-surface-container-low border-none border-b border-outline-variant focus:border-primary focus:ring-0 font-body-md rounded-none px-0 py-sm" />
          <p id="classesHelp" class="mt-1 text-xs text-on-surface-variant"></p>
        </div>
        
        <div id="presetPanel" class="hidden bg-surface-container-low p-4 rounded-lg mt-2">
            <div class="text-xs font-semibold uppercase text-primary">常用预设</div>
            <div id="presetButtons" class="mt-2 flex flex-wrap gap-2"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-gutter mt-4">
            <div class="space-y-base">
                <div class="flex justify-between items-center">
                    <label class="font-label-sm text-label-sm text-on-surface block">置信度: <span id="confValue">{{ conf_default }}</span></label>
                </div>
                <input type="range" id="confRange" name="conf" min="0" max="1" step="0.01" value="{{ conf_default }}" class="w-full accent-primary" />
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-base">
                    <label class="font-label-sm text-label-sm text-on-surface block">批大小</label>
                    <input type="number" id="batch_size" name="batch_size" value="{{ batch_default }}" min="1" class="w-full bg-surface-container-low border-none border-b border-outline-variant focus:border-primary focus:ring-0 font-body-md rounded-none px-0 py-sm" />
                </div>
                <div class="space-y-base">
                    <label class="font-label-sm text-label-sm text-on-surface block">图片尺寸</label>
                    <input type="number" id="imgsz" name="imgsz" value="{{ imgsz_default }}" min="64" step="32" class="w-full bg-surface-container-low border-none border-b border-outline-variant focus:border-primary focus:ring-0 font-body-md rounded-none px-0 py-sm" />
                </div>
            </div>
        </div>

        <div class="pt-sm space-y-4">
            <label class="font-label-sm text-label-sm text-on-surface block">附加时段过滤</label>
            <div class="flex gap-2">
                <button type="button" onclick="checkAllHours(true)" class="bg-surface-variant text-on-surface-variant px-3 py-1 rounded text-xs">全选</button>
                <button type="button" onclick="checkAllHours(false)" class="bg-surface-variant text-on-surface-variant px-3 py-1 rounded text-xs">清空</button>
            </div>
            <div class="grid grid-cols-6 lg:grid-cols-8 gap-2">
                {% for h in range(24) %}
                <label class="flex items-center gap-1 text-sm bg-surface-container-low px-2 py-1 rounded border border-transparent hover:border-primary">
                  <input type="checkbox" name="hours" value="{{ '%02d' % h }}" class="accent-primary" />
                  {{ '%02d' % h }}
                </label>
                {% endfor %}
            </div>
        </div>

        <div class="pt-sm mt-4 border-t border-outline-variant">
          <button type="submit" class="bg-primary text-on-primary font-label-sm text-label-sm px-gutter py-sm rounded-lg hover:bg-surface-tint transition-colors w-full md:w-auto flex items-center justify-center gap-2">
            <svg class="icon-inline" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            新建检测任务
          </button>
        </div>
      </form>
    </section>

  </div>

  <!-- Progress & Results sections -->
  <div class="wb-col wb-col-5">
    <section class="wb-card space-y-6">
        <div id="progressBox" class="hidden wb-card bg-surface ring-1 ring-[#e8e6dc] rounded-[24px] p-lg shadow-sm">
          <div class="flex justify-between items-center mb-4">
            <h3 class="wb-section-title font-headline-md text-headline-md text-on-surface">
              <svg class="icon-inline" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              任务进度
            </h3>
            <span id="progressStatus" class="bg-tertiary-fixed text-on-tertiary-fixed-variant px-3 py-1 rounded-full text-xs">运行中</span>
          </div>
          <div class="bg-surface-container-low p-4 rounded-xl">
            <div id="progressText" class="font-label-sm text-sm text-on-surface">已处理 0 / 0</div>
            <div id="progressSubtext" class="text-xs text-on-surface-variant mt-1">模型：通用</div>
            <div class="mt-3 w-full bg-surface-variant h-2 rounded-full overflow-hidden">
                <div id="progressBar" class="h-full w-0 bg-primary transition-all"></div>
            </div>
          </div>
          <div id="downloadLinks" class="mt-4 hidden flex gap-3">
            <a id="zipLink" href="#" target="_blank" class="bg-primary text-on-primary font-label-sm px-4 py-2 rounded-lg hover:bg-surface-tint transition-colors">下载 ZIP</a>
            <a id="sumLink" href="#" target="_blank" class="bg-surface-variant text-on-surface-variant font-label-sm px-4 py-2 rounded-lg hover:bg-outline-variant transition-colors">下载摘要说明</a>
            <button type="button" onclick="cancelCurrent()" class="bg-error text-on-error font-label-sm px-4 py-2 rounded-lg hover:bg-red-700 transition-colors">停止当前任务</button>
          </div>
        </div>

        <div id="oracleResultPanel" class="hidden wb-card bg-surface ring-1 ring-[#e8e6dc] rounded-[24px] p-lg shadow-sm">
          <div class="flex justify-between items-center mb-4">
            <h3 class="wb-section-title font-headline-md text-headline-md text-on-surface">
              <svg class="icon-inline" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              结果图身份识别
            </h3>
            <div class="flex gap-2">
                <button type="button" onclick="toggleAllResults('oracle', true)" class="bg-surface-variant px-3 py-1 rounded-lg text-sm">全选</button>
                <button type="button" onclick="toggleAllResults('oracle', false)" class="bg-surface-variant px-3 py-1 rounded-lg text-sm">清空</button>
                <button id="oracleAddDatasetBtn" type="button" onclick="openResultImportModal('oracle')" class="bg-surface-variant text-primary px-3 py-1 rounded-lg text-sm border border-primary">加入数据集</button>
                <button id="oracleIdentifySelectedBtn" type="button" onclick="identifySelectedResults('oracle')" class="bg-primary text-on-primary px-3 py-1 rounded-lg text-sm">识别身份</button>
            </div>
          </div>
          <div id="oracleResultSummary" class="text-sm text-on-surface-variant mb-4">暂无结果图</div>
          <div class="flex gap-2 text-xs mb-4">
            <span id="oracleLibraryStatus"></span>
            <span id="oracleLibraryTask" class="text-primary"></span>
          </div>
          <div id="oracleResultGrid" class="grid sm:grid-cols-2 gap-4"></div>
        </div>
    </section>
  </div>
</div>
</div>
