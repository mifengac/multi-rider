<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>态势总览 - 未成年人智能管控中枢</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='dist/tailwind.css') }}" />
  <script src="{{ url_for('static', filename='vendor/echarts.min.js') }}"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
    .stat-value { font-size: 2.2rem; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; }
    .stat-change { font-size: 0.75rem; }
    .stat-change.up { color: #f87171; }
    .stat-change.down { color: #34d399; }
    .alert-item { border-bottom: 1px solid #334155; padding: 10px 0; }
    .alert-item:last-child { border-bottom: none; }
    .badge-extreme { background: #dc2626; }
    .badge-high { background: #ea580c; }
    .badge-medium { background: #ca8a04; }
    .badge-low { background: #2563eb; }
    .badge-normal { background: #16a34a; }
    .nav-link { color: #94a3b8; text-decoration: none; padding: 6px 16px; border-radius: 6px; font-size: 0.85rem; }
    .nav-link:hover { background: #334155; color: #e2e8f0; }
    .nav-link.active { background: #3b82f6; color: white; }
  </style>
</head>
<body class="min-h-screen">
  <!-- Header -->
  <header class="flex items-center justify-between px-8 py-4 border-b border-slate-700">
    <div class="flex items-center gap-4">
      <h1 class="text-xl font-bold text-white">未成年人智能管控中枢</h1>
      <span class="text-xs text-slate-500">态势总览</span>
    </div>
    <nav class="flex items-center gap-2">
      <a href="/dashboard" class="nav-link active">态势总览</a>
      <a href="/graph" class="nav-link">关系图谱</a>
      <a href="/" class="nav-link">工作台</a>
    </nav>
    <div class="flex items-center gap-4">
      <span id="clock" class="text-sm text-slate-400"></span>
      <button onclick="location.reload()" class="text-xs text-slate-400 hover:text-white px-3 py-1 border border-slate-600 rounded">刷新</button>
    </div>
  </header>

  <!-- Main Grid -->
  <main class="p-6 grid grid-cols-12 gap-4" style="height: calc(100vh - 72px);">

    <!-- Top Stats Row -->
    <div class="col-span-3 card p-5 flex flex-col justify-center">
      <div class="stat-label mb-2">管控总人数</div>
      <div class="stat-value text-blue-400" id="statTotal">--</div>
    </div>
    <div class="col-span-3 card p-5 flex flex-col justify-center">
      <div class="stat-label mb-2">高风险人数</div>
      <div class="stat-value text-orange-400" id="statHighRisk">--</div>
    </div>
    <div class="col-span-3 card p-5 flex flex-col justify-center">
      <div class="stat-label mb-2">本月新增案件</div>
      <div class="stat-value text-red-400" id="statMonthCases">--</div>
    </div>
    <div class="col-span-3 card p-5 flex flex-col justify-center">
      <div class="stat-label mb-2">平均风险评分</div>
      <div class="stat-value text-yellow-400" id="statAvgScore">--</div>
    </div>

    <!-- Left: Charts -->
    <div class="col-span-4 card p-4 flex flex-col" style="height: calc(50% - 60px);">
      <h3 class="text-sm font-semibold text-slate-300 mb-2">案件类型分布</h3>
      <div id="chartCaseType" class="flex-1"></div>
    </div>
    <div class="col-span-5 card p-4 flex flex-col" style="height: calc(50% - 60px);">
      <h3 class="text-sm font-semibold text-slate-300 mb-2">月度趋势</h3>
      <div id="chartTrend" class="flex-1"></div>
    </div>
    <div class="col-span-3 card p-4 flex flex-col" style="height: calc(50% - 60px);">
      <h3 class="text-sm font-semibold text-slate-300 mb-2">风险等级分布</h3>
      <div id="chartRiskLevel" class="flex-1"></div>
    </div>

    <!-- Bottom Row -->
    <div class="col-span-4 card p-4 flex flex-col" style="height: calc(50% - 60px);">
      <h3 class="text-sm font-semibold text-slate-300 mb-2">辖区排名</h3>
      <div id="chartRanking" class="flex-1"></div>
    </div>
    <div class="col-span-5 card p-4 flex flex-col overflow-hidden" style="height: calc(50% - 60px);">
      <h3 class="text-sm font-semibold text-slate-300 mb-2">实时预警</h3>
      <div id="alertList" class="flex-1 overflow-y-auto text-sm"></div>
    </div>
    <div class="col-span-3 card p-4 flex flex-col" style="height: calc(50% - 60px);">
      <h3 class="text-sm font-semibold text-slate-300 mb-2">年龄分布</h3>
      <div id="chartAge" class="flex-1"></div>
    </div>
  </main>

  <script src="{{ url_for('static', filename='modules/dashboard/dashboard.js') }}"></script>
</body>
</html>
