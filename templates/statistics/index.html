<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>态势统计 - 猎影哨兵</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='dist/tailwind.css') }}" />
  <script src="{{ url_for('static', filename='modules/statistics/statistics.js') }}" defer></script>
</head>
<body class="min-h-screen bg-[#faf9f5] text-slate-900">
  <header class="border-b border-[#e8e6dc] bg-[#f5f4ed] px-8 py-5">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-6">
      <div>
        <div class="text-xs font-bold uppercase tracking-[0.24em] text-[#c96442]">Situation Statistics</div>
        <h1 class="mt-2 text-3xl font-bold tracking-tight">态势统计</h1>
        <p id="statsPeriodText" class="mt-2 text-sm text-slate-500">--</p>
      </div>
      <div class="flex items-center gap-3">
        <a href="{{ url_for('job.index') }}" class="rounded-lg border border-[#e8e6dc] bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">返回工作台</a>
        <button type="button" onclick="refreshStatistics(this)" class="rounded-lg bg-[#c96442] px-4 py-2 text-sm font-semibold text-white hover:bg-[#ad5638]">刷新</button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl space-y-6 px-8 py-8">
    <section class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
      <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
        <div>
          <h2 class="text-lg font-bold">统计范围</h2>
          <p id="statsRefreshTime" class="mt-1 text-sm text-slate-500">等待刷新</p>
        </div>
        <div class="flex flex-wrap items-end gap-3">
          <label class="block text-xs font-semibold text-slate-600">
            开始时间
            <input id="statsStart" type="datetime-local" class="mt-1 rounded-lg border border-slate-200 px-3 py-2 text-sm" />
          </label>
          <label class="block text-xs font-semibold text-slate-600">
            结束时间
            <input id="statsEnd" type="datetime-local" class="mt-1 rounded-lg border border-slate-200 px-3 py-2 text-sm" />
          </label>
          <button type="button" onclick="refreshStatistics(this)" class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700">应用筛选</button>
          <button type="button" onclick="generateStatisticsReport(this)" class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">生成报告</button>
        </div>
      </div>
      <div id="statsError" class="hidden mt-4 rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700"></div>
      <div id="statsReportResult" class="hidden mt-4 rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700"></div>
    </section>

    <section class="grid grid-cols-2 gap-4 lg:grid-cols-5">
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <div class="text-xs text-slate-500">检测任务</div>
        <div id="statsDetectionTasks" class="mt-2 text-3xl font-bold">--</div>
      </div>
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <div class="text-xs text-slate-500">处理图片/帧</div>
        <div id="statsProcessedItems" class="mt-2 text-3xl font-bold">--</div>
      </div>
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <div class="text-xs text-slate-500">AI 命中</div>
        <div id="statsHitItems" class="mt-2 text-3xl font-bold text-[#c96442]">--</div>
      </div>
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <div class="text-xs text-slate-500">命中率</div>
        <div id="statsHitRate" class="mt-2 text-3xl font-bold">--</div>
      </div>
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <div class="text-xs text-slate-500">待/已流转线索</div>
        <div id="statsDispatchQueue" class="mt-2 text-3xl font-bold">--</div>
      </div>
    </section>

    <section class="grid grid-cols-2 gap-4 lg:grid-cols-5">
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <div class="text-xs text-slate-500">涉及人员</div>
        <div id="statsDispatchPeople" class="mt-2 text-2xl font-bold">--</div>
      </div>
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <div class="text-xs text-slate-500">派单记录</div>
        <div id="statsDispatchRecords" class="mt-2 text-2xl font-bold">--</div>
      </div>
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <div class="text-xs text-slate-500">短信记录</div>
        <div id="statsSmsRecords" class="mt-2 text-2xl font-bold">--</div>
      </div>
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <div class="text-xs text-slate-500">团伙数量</div>
        <div id="statsGangCount" class="mt-2 text-2xl font-bold">--</div>
      </div>
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <div class="text-xs text-slate-500">团伙成员</div>
        <div id="statsGangMembers" class="mt-2 text-2xl font-bold">--</div>
      </div>
    </section>

    <section class="grid gap-6 lg:grid-cols-3">
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <h3 class="font-bold">检测状态</h3>
        <div id="statsByStatus" class="mt-4 space-y-4"></div>
      </div>
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <h3 class="font-bold">模型分布</h3>
        <div id="statsByModel" class="mt-4 space-y-4"></div>
      </div>
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <h3 class="font-bold">团伙 Top</h3>
        <div id="statsGangTop" class="mt-4 space-y-4"></div>
      </div>
    </section>

    <section class="grid gap-6 lg:grid-cols-2">
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <h3 class="font-bold">派单状态</h3>
        <div id="statsDispatchStatus" class="mt-4 space-y-4"></div>
      </div>
      <div class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
        <h3 class="font-bold">短信状态</h3>
        <div id="statsSmsStatus" class="mt-4 space-y-4"></div>
      </div>
    </section>

    <section class="rounded-2xl border border-[#e8e6dc] bg-white p-5 shadow-sm">
      <h3 class="font-bold">最近检测任务</h3>
      <div class="mt-4 overflow-x-auto">
        <table class="w-full text-left text-sm">
          <thead class="border-b border-slate-200 text-xs text-slate-500">
            <tr>
              <th class="px-4 py-3">任务 ID</th>
              <th class="px-4 py-3">类型</th>
              <th class="px-4 py-3">状态</th>
              <th class="px-4 py-3">总量</th>
              <th class="px-4 py-3">命中</th>
              <th class="px-4 py-3">开始时间</th>
            </tr>
          </thead>
          <tbody id="statsRecentJobs"></tbody>
        </table>
      </div>
    </section>

    <section class="rounded-2xl border border-amber-200 bg-amber-50 p-5 text-sm leading-7 text-amber-800">
      <h3 class="font-bold">待接入指标说明</h3>
      <ul id="statsNotes" class="mt-2 list-disc pl-5"></ul>
    </section>
  </main>
</body>
</html>
