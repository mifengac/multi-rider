<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}未成年人智能管控中枢{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='dist/tailwind.css') }}" />

  <style>
    /* ═══════════════════════════════════════
       暗色主题 CSS 变量
    ═══════════════════════════════════════ */
    :root {
      /* Background Colors */
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;

      /* Text Colors */
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;

      /* Accent Colors */
      --accent-blue: #3b82f6;
      --accent-blue-dark: #2563eb;
      --accent-blue-light: #60a5fa;

      /* Border Colors */
      --border-primary: #334155;

      /* Transitions */
      --transition-fast: 0.15s ease;
    }

    /* ═══════════════════════════════════════
       Reset & Base Styles
    ═══════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════
       Unified Navigation Bar
    ═══════════════════════════════════════ */
    .sentinel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border-primary);
      background: var(--bg-primary);
      height: 64px;
      flex-shrink: 0;
      z-index: 50;
    }

    .sentinel-header-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .sentinel-title {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.025em;
    }

    .sentinel-subtitle {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sentinel-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-tab {
      color: var(--text-secondary);
      text-decoration: none;
      padding: 0.375rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.85rem;
      cursor: pointer;
      background: transparent;
      border: none;
      transition: all var(--transition-fast);
      white-space: nowrap;
    }

    .nav-tab:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .nav-tab.active {
      background: var(--accent-blue);
      color: white;
      font-weight: 500;
    }

    .sentinel-header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .sentinel-clock {
      font-size: 0.875rem;
      color: var(--text-secondary);
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      min-width: 80px;
      text-align: right;
    }

    .sentinel-btn-refresh {
      padding: 0.375rem 1rem;
      font-size: 0.85rem;
      background: transparent;
      border: 1px solid var(--border-primary);
      border-radius: 0.375rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .sentinel-btn-refresh:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-color: var(--accent-blue);
    }

    /* ═══════════════════════════════════════
       Main Content Area
    ═══════════════════════════════════════ */
    .sentinel-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 64px);
      overflow: hidden;
    }

    .sentinel-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════
       Cards & Components
    ═══════════════════════════════════════ */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: 0.75rem;
    }

    .card-title {
      font-size: 0.875rem;
      color: var(--text-primary);
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .text-secondary {
      color: var(--text-secondary);
    }

    .text-tertiary {
      color: var(--text-tertiary);
    }

    /* ═══════════════════════════════════════
       Scrollbar Styling
    ═══════════════════════════════════════ */
    .sentinel-content::-webkit-scrollbar {
      width: 6px;
    }

    .sentinel-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .sentinel-content::-webkit-scrollbar-thumb {
      background: var(--border-primary);
      border-radius: 3px;
    }

    .sentinel-content::-webkit-scrollbar-thumb:hover {
      background: var(--text-tertiary);
    }

    {% block head %}{% endblock %}
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════
       Header with Unified Navigation
  ═══════════════════════════════════════ -->
  <header class="sentinel-header">
    <!-- Left: Title -->
    <div class="sentinel-header-left">
      <div>
        <div class="sentinel-title">猎影哨兵</div>
        <div class="sentinel-subtitle">未成年人智能管控中枢</div>
      </div>
    </div>

    <!-- Center: Navigation Tabs -->
    <nav class="sentinel-nav">
      <a href="/dashboard" class="nav-tab {% if active_tab == 'dashboard' %}active{% endif %}">
        态势总览
      </a>
      <a href="/profile" class="nav-tab {% if active_tab == 'profile' %}active{% endif %}">
        个人画像
      </a>
      <a href="/graph" class="nav-tab {% if active_tab == 'graph' %}active{% endif %}">
        关系图谱
      </a>
      <a href="/ai-analyst" class="nav-tab {% if active_tab == 'ai-analyst' %}active{% endif %}">
        AI研判
      </a>
      <a href="/workbench" class="nav-tab {% if active_tab == 'workbench' %}active{% endif %}">
        工作台
      </a>
    </nav>

    <!-- Right: Clock & Refresh -->
    <div class="sentinel-header-right">
      <div class="sentinel-clock" id="sentinelClock">--:--:--</div>
      <button class="sentinel-btn-refresh" onclick="location.reload()">刷新</button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════
       Main Content Container
  ═══════════════════════════════════════ -->
  <div class="sentinel-container">
    <main class="sentinel-content">
      {% block content %}
        <!-- Content will be injected here by child templates -->
      {% endblock %}
    </main>
  </div>

  <!-- ═══════════════════════════════════════
       Clock Script - Updates every second
  ═══════════════════════════════════════ -->
  <script>
    (function() {
      'use strict';

      /**
       * Real-time clock update function
       * Updates the header clock every second with current time
       */
      function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');

        const clockEl = document.getElementById('sentinelClock');
        if (clockEl) {
          clockEl.textContent = `${hours}:${minutes}:${seconds}`;
        }
      }

      // Update immediately
      updateClock();

      // Set up interval to update every second
      setInterval(updateClock, 1000);
    })();
  </script>

  <!-- ═══════════════════════════════════════
       Child Template Scripts
  ═══════════════════════════════════════ -->
  {% block scripts %}
    <!-- Scripts from child templates will be injected here -->
  {% endblock %}
</body>
</html>
