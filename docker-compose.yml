name: multi-rider

x-app-common: &app-common
  image: multi-rider:latest
  build:
    context: .
    dockerfile: ops/Dockerfile
    args:
      INSTALL_ML_STACK: ${INSTALL_ML_STACK:-false}
  env_file:
    - ${APP_ENV_FILE:-./app.env}
  volumes:
    - ${MULTI_RIDER_ROOT:-./runtime}/data:/data
    - ${MULTI_RIDER_ROOT:-./runtime}/data:/app/data
    - ${MULTI_RIDER_ROOT:-./runtime}/output:/app/output
    - ${MULTI_RIDER_ROOT:-./runtime}/datasets:/app/datasets
    - ${MULTI_RIDER_ROOT:-./runtime}/face_data:/app/face_data
    - ${MULTI_RIDER_ROOT:-./runtime}/train_runs:/app/train_runs
    - ${MULTI_RIDER_ROOT:-./runtime}/upload_tmp:/app/upload_tmp
  restart: unless-stopped

services:
  neo4j:
    image: ${NEO4J_IMAGE:-neo4j:5.20-community}
    container_name: multi-rider-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/CHANGE_ME}
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,gds.*
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - ${MULTI_RIDER_ROOT:-./runtime}/neo4j/data:/data
      - ${MULTI_RIDER_ROOT:-./runtime}/neo4j/logs:/logs
      - ${MULTI_RIDER_ROOT:-./runtime}/neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p \"${NEO4J_PASSWORD:-CHANGE_ME}\" \"RETURN 1;\" > /dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 45s
    restart: unless-stopped

  web:
    <<: *app-common
    container_name: multi-rider-web
    command: python app.py
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "${APP_PORT:-5001}:5001"

  worker:
    <<: *app-common
    container_name: multi-rider-worker
    command: python worker.py
    healthcheck:
      disable: true
    depends_on:
      neo4j:
        condition: service_healthy
      web:
        condition: service_healthy
