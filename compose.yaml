name: multi-rider

x-app-common: &app-common
  image: multi-rider:centos-stream10
  pull_policy: never
  env_file:
    - ${APP_ENV_FILE:-.env}
  volumes:
    - ./data:/data
  restart: unless-stopped

services:
  neo4j:
    image: ${NEO4J_IMAGE:-neo4j:5.20-community}
    container_name: multi-rider-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/CHANGE_ME}
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,gds.*
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p \"${NEO4J_PASSWORD:-CHANGE_ME}\" \"RETURN 1;\" > /dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 45s
    restart: unless-stopped

  web:
    <<: *app-common
    container_name: multi-rider-web
    command: /usr/local/bin/python app.py
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-5001}:5001"

  worker:
    <<: *app-common
    container_name: multi-rider-worker
    command: /usr/local/bin/python worker.py
    healthcheck:
      disable: true
    depends_on:
      neo4j:
        condition: service_healthy
      web:
        condition: service_healthy
